name: CI
on:
  pull_request:
  push:
jobs:
  build:
    name: Build and Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        jdk: ['8', '11', '21']
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.jdk }}
          cache: maven
      # The maven-invoker integration tests resolve real packages from the live
      # public-repo at exist-db.org, so they are excluded here to keep CI from
      # failing whenever that server is unreachable. They run (non-gating) in
      # the integration-tests job below.
      - name: Build and Test
        shell: bash
        run: mvn -B verify -Dinvoker.skip=true

  integration-tests:
    name: Integration Tests (live public-repo, non-gating)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Verify with integration tests
        shell: bash
        run: mvn -B verify
